<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ima2-worldcup — Glassmorphism</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#0a0a1a;color:#e2e8f0;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 40%,rgba(99,102,241,0.15) 0%,transparent 50%),radial-gradient(circle at 70% 60%,rgba(236,72,153,0.12) 0%,transparent 50%),radial-gradient(circle at 50% 80%,rgba(6,182,212,0.1) 0%,transparent 50%);z-index:0;animation:drift 20s ease-in-out infinite alternate}
@keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(-5%,3%)}}
.tag{position:fixed;top:12px;right:12px;background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.15);color:#e2e8f0;padding:4px 12px;font-size:11px;font-weight:600;letter-spacing:1px;z-index:99;border-radius:20px}
.app{max-width:960px;margin:0 auto;padding:20px;position:relative;z-index:1}
.glass{background:rgba(255,255,255,0.06);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.1);border-radius:16px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding:14px 20px}
.logo{font-size:24px;font-weight:700;background:linear-gradient(135deg,#818cf8,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tagline{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px}
.header-right{margin-left:auto;display:flex;gap:8px}
.btn{padding:7px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.06);backdrop-filter:blur(8px);color:#94a3b8;font-size:12px;cursor:pointer;font-weight:500;transition:all 0.2s}
.btn:hover{background:rgba(255,255,255,0.12);color:#e2e8f0}
.btn.primary{background:linear-gradient(135deg,#6366f1,#ec4899);color:#fff;border:none;font-weight:600}
.main{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.panel{overflow:hidden}
.panel-head{padding:12px 18px;border-bottom:1px solid rgba(255,255,255,0.06);font-size:12px;font-weight:600;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.5px}
.panel-body{padding:16px}
.upload{border:1.5px dashed rgba(255,255,255,0.15);border-radius:12px;padding:40px 16px;text-align:center;cursor:pointer;transition:all 0.2s}
.upload:hover{background:rgba(99,102,241,0.1);border-color:rgba(99,102,241,0.3)}
.upload-icon{font-size:36px;margin-bottom:8px;opacity:0.6}
.upload-text{font-size:13px;font-weight:600;color:#c4b5fd}
.upload-sub{font-size:10px;color:rgba(255,255,255,0.3);margin-top:4px}
.section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;margin:14px 0 8px;color:rgba(255,255,255,0.3)}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mode{padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);text-align:center;cursor:pointer;font-size:11px;font-weight:500;color:#94a3b8;transition:all 0.15s;background:transparent}
.mode:hover{background:rgba(255,255,255,0.05)}
.mode.on{background:rgba(99,102,241,0.15);border-color:rgba(99,102,241,0.3);color:#c4b5fd}
.mode-emoji{font-size:18px;display:block;margin-bottom:2px}
.style-row{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);font-size:11px;cursor:pointer;color:#94a3b8;transition:all 0.15s}
.chip:hover{background:rgba(255,255,255,0.05)}
.chip.on{background:rgba(236,72,153,0.15);border-color:rgba(236,72,153,0.3);color:#f9a8d4}
.fps{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(0,0,0,0.2);margin-top:12px}
.fps label{font-size:10px;color:rgba(255,255,255,0.4);font-weight:600}
.fps input[type=range]{flex:1;accent-color:#818cf8}
.fps .val{font-weight:700;font-size:13px;color:#c4b5fd;min-width:36px;text-align:right}
.gen-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#6366f1,#ec4899);color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:14px;transition:opacity 0.2s;letter-spacing:0.3px}
.gen-btn:hover{opacity:0.9}
.preview{min-height:340px;display:flex;align-items:center;justify-content:center}
.preview-text{text-align:center;color:rgba(255,255,255,0.2);font-size:13px}
.preview canvas{width:100%;height:260px;border-radius:10px;border:1px solid rgba(255,255,255,0.08)}
.result-bar{display:flex;gap:6px;margin-top:10px}
.result-bar .btn{flex:1;font-size:11px;padding:7px}
.pbar{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:10px;overflow:hidden}
.pfill{height:100%;width:65%;background:linear-gradient(90deg,#6366f1,#ec4899);border-radius:2px}
.ptxt{font-size:10px;color:rgba(255,255,255,0.3);margin-top:4px;text-align:center}
</style>
</head>
<body>
<div class="tag">B · GLASSMORPHISM</div>
<div class="app">
  <div class="header glass">
    <div>
      <div class="logo">ima2-worldcup</div>
      <div class="tagline">AI Style Transfer for Sports Highlights</div>
    </div>
    <div class="header-right">
      <button class="btn">GitHub</button>
      <button class="btn primary">Sign In</button>
    </div>
  </div>
  <div class="main">
    <div>
      <div class="panel glass" style="margin-bottom:14px">
        <div class="panel-head">Upload</div>
        <div class="panel-body">
          <div class="upload" onclick="this.innerHTML='<div class=upload-icon>⚽</div><div class=upload-text>world_cup_goal.mp4</div><div class=upload-sub>12.4 MB · 0:10 · 1080p</div>'">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Drop video or image</div>
            <div class="upload-sub">MP4 · GIF · PNG · JPG — max 100MB</div>
          </div>
        </div>
      </div>
      <div class="panel glass">
        <div class="panel-head">Settings</div>
        <div class="panel-body">
          <div class="section-label">Mode</div>
          <div class="mode-grid">
            <div class="mode on" onclick="document.querySelectorAll('.mode').forEach(m=>m.classList.remove('on'));this.classList.add('on')"><span class="mode-emoji">🖼️</span>Image</div>
            <div class="mode" onclick="document.querySelectorAll('.mode').forEach(m=>m.classList.remove('on'));this.classList.add('on')"><span class="mode-emoji">🎞️</span>Frames→GIF</div>
            <div class="mode" onclick="document.querySelectorAll('.mode').forEach(m=>m.classList.remove('on'));this.classList.add('on')"><span class="mode-emoji">📸</span>Video→1pic</div>
            <div class="mode" onclick="document.querySelectorAll('.mode').forEach(m=>m.classList.remove('on'));this.classList.add('on')"><span class="mode-emoji">🎬</span>Grok V2V</div>
          </div>
          <div class="section-label">Style</div>
          <div class="style-row">
            <div class="chip on" onclick="document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));this.classList.add('on')">Crayon</div>
            <div class="chip" onclick="document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));this.classList.add('on')">Watercolor</div>
            <div class="chip" onclick="document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));this.classList.add('on')">Oil</div>
            <div class="chip" onclick="document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));this.classList.add('on')">Sketch</div>
            <div class="chip" onclick="document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));this.classList.add('on')">Anime</div>
            <div class="chip" onclick="document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));this.classList.add('on')">Custom</div>
          </div>
          <div class="fps">
            <label>FPS</label>
            <input type="range" min="1" max="9" value="3" oninput="this.nextElementSibling.textContent=['⅓','½','1','1.5','2','2.5','3','4','5'][this.value-1]+'/s'">
            <span class="val">1/s</span>
          </div>
          <button class="gen-btn" onclick="showResult()">Generate</button>
        </div>
      </div>
    </div>
    <div class="panel glass">
      <div class="panel-head">Preview</div>
      <div class="panel-body">
        <div class="preview" id="prev">
          <div class="preview-text">Upload & Generate<br>to see result</div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
function showResult(){
  const p=document.getElementById('prev');
  p.innerHTML='<div style="width:100%"><canvas id="c"></canvas><div class="pbar"><div class="pfill"></div></div><div class="ptxt">Frame 7/10 — crayon style...</div><div class="result-bar"><button class="btn">Retry</button><button class="btn">Share</button><button class="btn primary">Download</button></div></div>';
  drawArt(document.getElementById('c'));
}
function drawArt(c){
  const x=c.getContext('2d');c.width=440;c.height=260;c.style.width='100%';c.style.height='260px';c.style.borderRadius='10px';
  x.fillStyle='#1e3a8a';x.fillRect(0,0,440,90);
  for(let i=0;i<80;i++){x.fillStyle=['#ef4444','#3b82f6','#fbbf24','#22c55e','#f472b6'][~~(Math.random()*5)];x.beginPath();x.arc(Math.random()*440,Math.random()*60+10,2+Math.random()*3,0,Math.PI*2);x.fill()}
  x.fillStyle='#111827';x.fillRect(0,70,440,24);
  for(let y=94;y<260;y+=2)for(let i=0;i<440;i+=3){x.fillStyle=`rgb(${30+Math.random()*20},${120+Math.random()*40},${20+Math.random()*15})`;x.fillRect(i,y,3,2)}
  x.strokeStyle='rgba(255,255,255,0.3)';x.lineWidth=1.5;x.beginPath();x.moveTo(0,170);x.lineTo(440,170);x.stroke();
  [{x:80,y:150,c:'#dbeafe'},{x:200,y:170,c:'#dbeafe'},{x:350,y:140,c:'#dbeafe'},{x:120,y:190,c:'#86efac'},{x:280,y:160,c:'#86efac'},{x:220,y:175,c:'#fcd34d'}].forEach(p=>{x.fillStyle=p.c;x.beginPath();x.arc(p.x,p.y,p.c==='#fcd34d'?4:6,0,Math.PI*2);x.fill()})
}
</script>
</body>
</html>
