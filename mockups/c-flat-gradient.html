<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ima2-worldcup — Flat + Arc Gradient</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#06b6d4;--accent2:#f472b6;--bg:#fafafa;--surface:#fff;--text:#111;--dim:#64748b;--border:#e2e8f0;--radius:12px}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.tag{position:fixed;top:12px;right:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:4px 14px;font-size:11px;font-weight:600;letter-spacing:1px;z-index:99;border-radius:20px}
.app{max-width:960px;margin:0 auto;padding:20px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding:14px 20px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border)}
.logo{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-0.5px}
.logo span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tagline{font-size:11px;color:var(--dim);margin-top:1px}
.header-right{margin-left:auto;display:flex;gap:8px}
.btn{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--dim);font-size:12px;cursor:pointer;font-weight:500;transition:all 0.15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;font-weight:600}
.main{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.panel{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.panel-head{padding:12px 18px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px}
.panel-body{padding:16px}
.upload{border:2px dashed var(--border);border-radius:10px;padding:40px 16px;text-align:center;cursor:pointer;transition:all 0.15s}
.upload:hover{border-color:var(--accent);background:#f0fdfa}
.upload-icon{font-size:36px;margin-bottom:8px}
.upload-text{font-size:13px;font-weight:600;color:var(--accent)}
.upload-sub{font-size:10px;color:var(--dim);margin-top:4px}
.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin:14px 0 8px;color:var(--dim)}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mode{padding:10px;border-radius:10px;border:1.5px solid var(--border);text-align:center;cursor:pointer;font-size:11px;font-weight:600;color:var(--dim);transition:all 0.15s}
.mode:hover{border-color:#94a3b8}
.mode.on{border-color:var(--accent);background:#ecfeff;color:#0891b2}
.mode-emoji{font-size:18px;display:block;margin-bottom:2px}
.style-row{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:11px;cursor:pointer;color:var(--dim);font-weight:500;transition:all 0.15s}
.chip:hover{border-color:#94a3b8}
.chip.on{border-color:var(--accent2);background:#fdf2f8;color:#db2777}
.fps{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:var(--bg);margin-top:12px}
.fps label{font-size:10px;color:var(--dim);font-weight:600}
.fps input[type=range]{flex:1;accent-color:var(--accent)}
.fps .val{font-weight:700;font-size:13px;color:var(--accent);min-width:36px;text-align:right}
.gen-btn{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:14px;transition:opacity 0.15s}
.gen-btn:hover{opacity:0.9}
.preview{min-height:340px;display:flex;align-items:center;justify-content:center}
.preview-text{text-align:center;color:#cbd5e1;font-size:13px}
.preview canvas{width:100%;height:260px;border-radius:10px;border:1px solid var(--border)}
.result-bar{display:flex;gap:6px;margin-top:10px}
.result-bar .btn{flex:1;font-size:11px;padding:7px}
.pbar{height:3px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
.pfill{height:100%;width:65%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px}
.ptxt{font-size:10px;color:var(--dim);margin-top:4px;text-align:center}
/* Style-based theme switching */
.theme-crayon{--accent:#f97316;--accent2:#ef4444;--bg:#fffbeb}
.theme-watercolor{--accent:#06b6d4;--accent2:#8b5cf6;--bg:#f0f9ff}
.theme-oil{--accent:#854d0e;--accent2:#b45309;--bg:#fefce8}
.theme-sketch{--accent:#374151;--accent2:#6b7280;--bg:#f9fafb}
.theme-anime{--accent:#ec4899;--accent2:#8b5cf6;--bg:#fdf2f8}
</style>
</head>
<body>
<div class="tag">C · FLAT + ARC GRADIENT</div>
<div class="app">
  <div class="header">
    <div>
      <div class="logo">ima2-<span>worldcup</span></div>
      <div class="tagline">AI Style Transfer for Sports Highlights</div>
    </div>
    <div class="header-right">
      <button class="btn">GitHub</button>
      <button class="btn primary">Sign In</button>
    </div>
  </div>
  <div class="main">
    <div>
      <div class="panel" style="margin-bottom:14px">
        <div class="panel-head">Upload</div>
        <div class="panel-body">
          <div class="upload" onclick="this.innerHTML='<div class=upload-icon>⚽</div><div class=upload-text>world_cup_goal.mp4</div><div class=upload-sub>12.4 MB · 0:10 · 1080p</div>'">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Drop video or image</div>
            <div class="upload-sub">MP4 · GIF · PNG · JPG — max 100MB</div>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head">Settings</div>
        <div class="panel-body">
          <div class="section-label">Mode</div>
          <div class="mode-grid">
            <div class="mode on" onclick="document.querySelectorAll('.mode').forEach(m=>m.classList.remove('on'));this.classList.add('on')"><span class="mode-emoji">🖼️</span>Image</div>
            <div class="mode" onclick="document.querySelectorAll('.mode').forEach(m=>m.classList.remove('on'));this.classList.add('on')"><span class="mode-emoji">🎞️</span>Frames→GIF</div>
            <div class="mode" onclick="document.querySelectorAll('.mode').forEach(m=>m.classList.remove('on'));this.classList.add('on')"><span class="mode-emoji">📸</span>Video→1pic</div>
            <div class="mode" onclick="document.querySelectorAll('.mode').forEach(m=>m.classList.remove('on'));this.classList.add('on')"><span class="mode-emoji">🎬</span>Grok V2V</div>
          </div>
          <div class="section-label">Style</div>
          <div class="style-row">
            <div class="chip on" onclick="setTheme(this,'theme-crayon')">Crayon</div>
            <div class="chip" onclick="setTheme(this,'theme-watercolor')">Watercolor</div>
            <div class="chip" onclick="setTheme(this,'theme-oil')">Oil</div>
            <div class="chip" onclick="setTheme(this,'theme-sketch')">Sketch</div>
            <div class="chip" onclick="setTheme(this,'theme-anime')">Anime</div>
            <div class="chip" onclick="setTheme(this,'')">Custom</div>
          </div>
          <div class="fps">
            <label>FPS</label>
            <input type="range" min="1" max="9" value="3" oninput="this.nextElementSibling.textContent=['⅓','½','1','1.5','2','2.5','3','4','5'][this.value-1]+'/s'">
            <span class="val">1/s</span>
          </div>
          <button class="gen-btn" onclick="showResult()">Generate</button>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-head">Preview</div>
      <div class="panel-body">
        <div class="preview" id="prev">
          <div class="preview-text">Upload & Generate<br>to see result</div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
document.body.classList.add('theme-crayon');
function setTheme(el, cls){
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');
  document.body.className=cls;
}
function showResult(){
  const p=document.getElementById('prev');
  p.innerHTML='<div style="width:100%"><canvas id="c"></canvas><div class="pbar"><div class="pfill"></div></div><div class="ptxt">Frame 7/10 — crayon style...</div><div class="result-bar"><button class="btn">Retry</button><button class="btn">Share</button><button class="btn primary">Download</button></div></div>';
  drawArt(document.getElementById('c'));
}
function drawArt(c){
  const x=c.getContext('2d');c.width=440;c.height=260;c.style.width='100%';c.style.height='260px';c.style.borderRadius='10px';
  x.fillStyle='#2563eb';x.fillRect(0,0,440,90);
  for(let i=0;i<80;i++){x.fillStyle=['#ef4444','#3b82f6','#fbbf24','#22c55e','#f472b6'][~~(Math.random()*5)];x.beginPath();x.arc(Math.random()*440,Math.random()*60+10,2+Math.random()*3,0,Math.PI*2);x.fill()}
  x.fillStyle='#1e293b';x.fillRect(0,70,440,24);
  for(let y=94;y<260;y+=2)for(let i=0;i<440;i+=3){x.fillStyle=`rgb(${30+Math.random()*20},${120+Math.random()*40},${20+Math.random()*15})`;x.fillRect(i,y,3,2)}
  x.strokeStyle='rgba(255,255,255,0.3)';x.lineWidth=1.5;x.beginPath();x.moveTo(0,170);x.lineTo(440,170);x.stroke();
  [{x:80,y:150,c:'#dbeafe'},{x:200,y:170,c:'#dbeafe'},{x:350,y:140,c:'#dbeafe'},{x:120,y:190,c:'#86efac'},{x:280,y:160,c:'#86efac'},{x:220,y:175,c:'#fcd34d'}].forEach(p=>{x.fillStyle=p.c;x.beginPath();x.arc(p.x,p.y,p.c==='#fcd34d'?4:6,0,Math.PI*2);x.fill()})
}
</script>
</body>
</html>
